apiVersion: apps/v1
kind: Deployment
metadata:
  name: "testtttooo"
  namespace: "agents-testooo"
  labels:
    app: "testtttooo"
    team: "testooo"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "testtttooo"
  template:
    metadata:
      labels:
        app: "testtttooo"
        team: "testooo"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-testtttooo"
      containers:
        - name: "testtttooo"
          image: "acrshoppoc.azurecr.io/agents/testtttooo:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-testtttooo"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
